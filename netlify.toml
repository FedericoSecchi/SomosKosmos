[build]
  publish = "dist"

# ---------------------------------------------------------------------------
# Prerendering for search engine and social media crawlers
#
# Routes bot user-agents through prerender.io so they receive fully-rendered
# HTML instead of the blank SPA shell. Regular users are unaffected.
#
# To activate:
#   1. Create a free account at https://prerender.io
#   2. Get your token from the Prerender.io dashboard
#   3. Replace YOUR_PRERENDER_TOKEN below with your actual token
#   4. Deploy — Netlify will route bots automatically
#
# Alternatively, enable Netlify's built-in prerendering from the Netlify
# dashboard: Site settings → Build & deploy → Prerendering
# ---------------------------------------------------------------------------

# [[redirects]]
#   from = "/*"
#   to = "https://service.prerender.io/https://somoskosmos.com/:splat"
#   status = 200
#   conditions = {Cookie = ["", ""], headers = {X-Prerender = ""}}
#   force = false
#   [redirects.headers]
#     X-Prerender-Token = "YOUR_PRERENDER_TOKEN"

# SPA fallback: serve index.html for all routes so client-side routing works and direct URLs don't 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
